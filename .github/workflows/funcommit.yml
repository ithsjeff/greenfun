name: Auto Commit

on:
  workflow_dispatch:
    inputs:
      commit_count:
        description: 'Number of commits (Leave blank for random 1-3)'
        required: false
        default: ''
      backdate:
        description: 'Time Travel! (Format: YYYY-MM-DDTHH:MM:SS)'
        required: false
        default: ''
      skip_day_off:
        description: 'Force run (Skip the random 20% "day off" chance)'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 23,2 * * *"

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Phnom_Penh'
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Generate Commits
        run: |
          # 1. Simulate a 'Day Off'
          FORCE_RUN="${{ github.event.inputs.skip_day_off }}"
          if [[ "$FORCE_RUN" != "true" ]]; then
            if [[ -z "${{ github.event.inputs.commit_count }}" && -z "${{ github.event.inputs.backdate }}" ]]; then
              if (( RANDOM % 5 == 0 )); then
                echo "Taking a break! Skipping this scheduled run to look more human."
                exit 0
              fi
            fi
          else
            echo "Force run checked! Skipping the 'day off' logic."
          fi

          # 2. Setup Identity
          git config --local user.email "iths003.hsgroup@gmail.com"
          git config --local user.name "ithsjeff"
          DEFAULT_BRANCH=${{ github.ref_name }}

          # 3. Determine Iteration Count
          INPUT_VAL="${{ github.event.inputs.commit_count }}"
          if [ -z "$INPUT_VAL" ]; then
            ITERATIONS=$(( ( RANDOM % 3 )  + 1 ))
          else
            ITERATIONS=$INPUT_VAL
          fi
          
          # 4. Setup Time Travel
          BACKDATE="${{ github.event.inputs.backdate }}"
          if [ -n "$BACKDATE" ]; then
            export GIT_AUTHOR_DATE="$BACKDATE"
            export GIT_COMMITTER_DATE="$BACKDATE"
          fi

          # 5. Initialize Streak
          if [ ! -f .bot_streak ]; then echo 0 > .bot_streak; fi
          STREAK=$(cat .bot_streak)
          
          # 6. Setup Language & Branch Spoofing (EXPANDED LIST)
          SPOOF_TARGETS=(
            "Golang:go:engine/core.go"
            "Rust:rs:src/memory.rs"
            "Python:py:scripts/ml_pipeline.py"
            "JavaScript:js:ui/app.js"
            "PHP:php:backend/api.php"
            "TypeScript:ts:frontend/utils.ts"
            "C++:cpp:core/engine.cpp"
            "Java:java:src/main/App.java"
            "Shell:sh:scripts/deploy.sh"
            "Ruby:rb:lib/parser.rb"
            "C#:cs:services/Auth.cs"
            "Swift:swift:ios/App.swift"
            "Kotlin:kt:android/MainActivity.kt"
          )
          RANDOM_TARGET="${SPOOF_TARGETS[$RANDOM % ${#SPOOF_TARGETS[@]}]}"
          LANG_NAME=$(echo "$RANDOM_TARGET" | cut -d: -f1)
          FILE_PATH=$(echo "$RANDOM_TARGET" | cut -d: -f3)
          
          SAFE_TIME=$(date +'%s')
          
          # Format the branch name cleanly (removing special characters like ++ or #)
          CLEAN_LANG=$(echo "$LANG_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/+//g; s/#//g')
          BRANCH_NAME="feature/${CLEAN_LANG}-update-$SAFE_TIME"
          
          git checkout -b "$BRANCH_NAME"

          # 7. Execution Loop
          for ((i=1; i<=ITERATIONS; i++))
          do
            sleep 2
            STREAK=$((STREAK + 1))
            echo $STREAK > .bot_streak
            TIMESTAMP=$(date +'%Y-%m-%dT%H:%M:%S %Z')
            
            JOKE=$(curl -sfSL -m 10 --retry 3 "https://v2.jokeapi.dev/joke/Programming?format=txt&type=single" || echo "Code is like humor. When you have to explain it, it’s bad.")
            FACT=$(curl -sfSL -m 10 --retry 3 "https://uselessfacts.jsph.pl/api/v2/facts/random" | jq -r '.text' || echo "The server forgot its fun fact for today.")
            
            PUZZLE_RES=$(curl -sfSL -m 10 --retry 3 "https://lichess.org/api/puzzle/daily" || echo "")
            PUZZLE_ID=$(echo "$PUZZLE_RES" | jq -r '.puzzle.id // empty')
            if [ -n "$PUZZLE_ID" ]; then
              PUZZLE_TEXT="[Solve Puzzle $PUZZLE_ID](https://lichess.org/training/$PUZZLE_ID)"
            else
              PUZZLE_TEXT="Checkmate. API unavailable."
            fi
            
            mkdir -p "$(dirname "$FILE_PATH")"
            
            # Use appropriate comment syntax based on the language
            if [[ "$LANG_NAME" == "Python" || "$LANG_NAME" == "Ruby" || "$LANG_NAME" == "Shell" ]]; then
              echo "# Auto-sync $TIMESTAMP" >> "$FILE_PATH"
            else
              echo "// Auto-sync $TIMESTAMP" >> "$FILE_PATH"
            fi
            
            echo "### 🤖 Auto-Commit Log #$STREAK" >> BOT_ACTIVITY.md
            echo "*📅 $TIMESTAMP*" >> BOT_ACTIVITY.md
            echo "" >> BOT_ACTIVITY.md
            echo "* ♟️ **Daily Chess Puzzle:** $PUZZLE_TEXT" >> BOT_ACTIVITY.md
            echo "* 🧠 **Fact of the Day:** $FACT" >> BOT_ACTIVITY.md
            echo "" >> BOT_ACTIVITY.md
            echo "**💻 Dev Humor:**" >> BOT_ACTIVITY.md
            echo "> $JOKE" >> BOT_ACTIVITY.md
            echo "" >> BOT_ACTIVITY.md
            echo "***" >> BOT_ACTIVITY.md
            echo "" >> BOT_ACTIVITY.md
            
            tail -n 300 BOT_ACTIVITY.md > temp_log.md && mv temp_log.md BOT_ACTIVITY.md
            
            git add BOT_ACTIVITY.md .bot_streak "$FILE_PATH"
            
            API_MSG=$(curl -sfSL -m 10 --retry 3 "https://whatthecommit.com/index.txt" || echo "chore(bot): doing bot things")
            git commit -m "bot: $API_MSG"
          done

          # 8. GitHub CLI Pull Request Strategy
          git push -u origin "$BRANCH_NAME"
          
          gh pr create \
            --title "✨ feat: $LANG_NAME integration updates" \
            --body "Automated daily sync and puzzle generation for $LANG_NAME. Review streak: **$STREAK**" \
            --head "$BRANCH_NAME" \
            --base "$DEFAULT_BRANCH"
          
          gh pr merge "$BRANCH_NAME" --merge --delete-branch
