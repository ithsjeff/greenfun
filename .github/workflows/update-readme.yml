name: Update README

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Commit"]
    types:
      - completed

jobs:
  update_readme:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Phnom_Penh'
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate Dynamic README
        run: |
          # 1. Grab the latest bot streak
          STREAK=0
          if [ -f .bot_streak ]; then 
            STREAK=$(cat .bot_streak)
          fi
          
          TIMESTAMP=$(date +'%B %d, %Y at %I:%M %p')

          # 2. Build the README safely using echo to avoid YAML parsing errors
          echo "# 🤖 Auto-Commit Bot Workspace" > README.md
          echo "" >> README.md
          echo "Welcome to this active workspace. This repository is maintained by an automated bot that loves daily chess puzzles, programming jokes, and simulating branch activity." >> README.md
          echo "" >> README.md
          echo "### 📊 Bot Status" >> README.md
          echo "* ⚡ **Lifetime Auto-Commits:** $STREAK" >> README.md
          echo "* ⏱️ **Last Sync:** $TIMESTAMP" >> README.md
          echo "* 📜 **Activity Log:** Check out [BOT_ACTIVITY.md](./BOT_ACTIVITY.md) for the latest data dump." >> README.md
          echo "" >> README.md
          echo "***" >> README.md
          echo "" >> README.md
          echo "*This README is auto-generated and updated dynamically via GitHub Actions.*" >> README.md

      - name: Commit and Push README
        run: |
          git config --local user.email "iths003.hsgroup@gmail.com"
          git config --local user.name "ithsjeff"
          
          # Only commit if the README actually changed to avoid empty commit errors
          if [[ -n $(git status --porcelain README.md) ]]; then
            git add README.md
            git commit -m "docs: 📝 dynamic README update"
            git push
          else
            echo "README is already up to date. Skipping commit."
          fi
